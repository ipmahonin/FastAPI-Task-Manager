version: '3.9'

services:
  db:
    image: postgres:15
    container_name: tasks_db
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tasks"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    container_name: tasks_app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: db
      DB_NAME: tasks
      DB_USER: user
      DB_PASSWORD: password